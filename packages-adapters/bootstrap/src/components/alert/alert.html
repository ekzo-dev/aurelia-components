<template class="alert alert-${variant} ${dismissible ? 'alert-dismissible fade show' : ''}" role="alert">
  <au-slot></au-slot>
  <button
    if.bind="dismissible"
    bs-close-button
    click.trigger="close()"
    type="button"
    aria-label="Close"
    disabled.bind="disabled"
  ></button>
</template>
