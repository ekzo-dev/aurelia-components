<template class="toast ${animation ? 'fade' : ''} ${variant ? 'text-bg-' + variant : ''}">
  <div class="toast-header">
    <au-slot name="header">
      <div style="margin-right: auto">${header}</div>
    </au-slot>
    <button type="button" bs-close-button click.trigger="hide()" aria-label="Close"></button>
  </div>
  <div class="toast-body">
    <au-slot>${body}</au-slot>
  </div>
</template>
